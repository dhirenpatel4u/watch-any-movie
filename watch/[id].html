<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

iframe {
    border: 0;
    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>

<iframe id="player"
        allowfullscreen
        webkitallowfullscreen
        mozallowfullscreen>
</iframe>

<script>
const pathParts = window.location.pathname.split('/');
const tmdbId = pathParts[pathParts.length - 1];

document.getElementById('player').src =
    `https://gemma416okl.com/play/${tmdbId}`;
</script>

</body>
</html>
